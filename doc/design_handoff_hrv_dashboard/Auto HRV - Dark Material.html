<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Auto HRV — Dark Material</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --page: #060708;
    --bg: #0A0B0E;
    --surface: #131519;
    --surface-2: #1A1D23;
    --surface-3: #21252c;
    --outline: rgba(255,255,255,0.07);
    --outline-strong: rgba(255,255,255,0.13);
    --on: #ECEFF3;
    --muted: #9298A2;
    --faint: #5C626C;
    --accent: #1FD3E0;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --ui: 'Hanken Grotesk', system-ui, sans-serif;
    --r-card: 24px;
    --r-tile: 18px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--page); }
  body { font-family: var(--ui); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  button { font-family: inherit; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  * { scrollbar-width: none; }

  @keyframes cc-beat {
    0%, 100% { transform: scale(1); }
    14% { transform: scale(1.22); }
    28% { transform: scale(1); }
    42% { transform: scale(1.1); }
    56% { transform: scale(1); }
  }
  @keyframes cc-pulse {
    0%, 100% { box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 25%, transparent); }
    50% { box-shadow: 0 0 0 6px color-mix(in srgb, var(--accent) 6%, transparent); }
  }
  @keyframes cc-ripple {
    0% { transform: scale(0.75); opacity: 0.9; }
    100% { transform: scale(1.25); opacity: 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="android-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="src/ui.jsx"></script>
<script type="text/babel" src="src/viz.jsx"></script>
<script type="text/babel" src="src/screens1.jsx"></script>
<script type="text/babel" src="src/screens2.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
