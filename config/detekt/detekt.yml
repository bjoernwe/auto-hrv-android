build:
  maxIssues: 0

config:
  validation: true
  warningsAsErrors: false

formatting:
  active: true
  android: true
  autoCorrect: true

comments:
  active: true
  UndocumentedPublicClass:
    active: false
  UndocumentedPublicFunction:
    active: false
  UndocumentedPublicProperty:
    active: false

complexity:
  active: true
  LongMethod:
    threshold: 60
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 8
  TooManyFunctions:
    thresholdInFiles: 20
    thresholdInClasses: 15

naming:
  active: true
  FunctionNaming:
    functionPattern: '[a-z][a-zA-Z0-9]*'
    # Allow Compose preview/component functions starting with uppercase
    ignoreAnnotated: ['Composable', 'Preview']

style:
  active: true
  MagicNumber:
    active: false
  ReturnCount:
    max: 3
  WildcardImport:
    active: true
    excludeImports:
      - 'kotlinx.android.synthetic.*'